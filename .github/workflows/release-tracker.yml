name: Release Tracker

on:
  schedule:
    - cron: '0 14 * * *'   # Daily at 9am CT (14:00 UTC / CDT)
  workflow_dispatch:        # Allow manual runs from GitHub UI

jobs:
  track:
    name: Track ${{ matrix.repo }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - Tonely-Learning/maestro-gen
          - Tonely-Learning/tonely

    steps:
      - name: Run release tracker
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ matrix.repo }}
        run: |
          set -euo pipefail

          echo "=== Release Tracker: $REPO ==="

          # ── Step 1: Find watermark ─────────────────────────────────────────
          WATERMARK=$(gh issue list -R "$REPO" \
            --state all --limit 1 \
            --json createdAt \
            --jq '.[0].createdAt // empty' 2>/dev/null || true)

          if [ -z "$WATERMARK" ]; then
            WATERMARK=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%SZ')
            echo "No existing issues — using 30-day lookback: $WATERMARK"
          else
            echo "Watermark from last issue: $WATERMARK"
          fi

          # ── Step 2: Fetch commits since watermark ──────────────────────────
          COMMITS=$(gh api "repos/$REPO/commits" \
            --paginate \
            -f since="$WATERMARK" \
            --jq '.[] | .sha[:7] + " " + (.commit.message | split("\n")[0])' \
            2>/dev/null || true)

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $WATERMARK — skipping."
            exit 0
          fi

          COMMIT_COUNT=$(echo "$COMMITS" | grep -c . || true)
          echo "Found $COMMIT_COUNT commit(s)"

          if [ "$COMMIT_COUNT" -lt 3 ]; then
            echo "Fewer than 3 commits — not enough to log yet."
            exit 0
          fi

          # ── Step 3: Ensure labels exist ────────────────────────────────────
          for label in "completed:#0e8a16" "claude:#6f42c1" "feature:#0075ca" "bug:#d73a4a" "infrastructure:#e4e669"; do
            name="${label%%:*}"
            color="${label##*:}"
            gh label create "$name" --color "$color" -R "$REPO" 2>/dev/null || true
          done

          # ── Step 4: Group commits by type ──────────────────────────────────
          # Patterns are case-insensitive prefix matches on the commit subject
          FEAT=$(echo "$COMMITS" | grep -iE '^[a-f0-9]+ (feat|feature|add|implement|new|support)' || true)
          FIX=$(echo  "$COMMITS" | grep -iE '^[a-f0-9]+ (fix|bug|patch|hotfix|revert|resolve)' || true)
          INFRA=$(echo "$COMMITS" | grep -iE '^[a-f0-9]+ (chore|ci|build|refactor|docs|infra|setup|config|test|update|upgrade|bump|lint|format)' || true)
          OTHER=$(echo "$COMMITS" | grep -ivE '^[a-f0-9]+ (feat|feature|add|implement|new|support|fix|bug|patch|hotfix|revert|resolve|chore|ci|build|refactor|docs|infra|setup|config|test|update|upgrade|bump|lint|format)' || true)

          # ── Step 5: Helper — create and immediately close an issue ─────────
          create_issue() {
            local title="$1"
            local labels="$2"
            local commits="$3"
            local points="$4"

            local commit_list
            commit_list=$(echo "$commits" | sed 's/^/- /')

            local url
            url=$(gh issue create -R "$REPO" \
              --title "$title" \
              --label "$labels" \
              --body "$(printf '## Summary\n%s\n\n## Commits\n%s\n\n## Story Points: %s\n**Implemented by:** Claude' \
                "$title" "$commit_list" "$points")" \
              2>&1 | tail -1)

            local num
            num=$(echo "$url" | grep -oE '[0-9]+$')
            gh issue close "$num" -R "$REPO" --reason completed
            echo "  Closed #$num — $url"
          }

          echo ""
          echo "=== Creating issues ==="

          RUN_DATE=$(date +%Y-%m-%d)

          [ -n "$FEAT"  ] && create_issue "Feature work ($RUN_DATE)"         "feature,claude,completed"        "$FEAT"  "5"
          [ -n "$FIX"   ] && create_issue "Bug fixes ($RUN_DATE)"             "bug,claude,completed"            "$FIX"   "3"
          [ -n "$INFRA" ] && create_issue "Infrastructure & maintenance ($RUN_DATE)" "infrastructure,claude,completed" "$INFRA" "3"
          [ -n "$OTHER" ] && create_issue "Miscellaneous commits ($RUN_DATE)" "feature,claude,completed"        "$OTHER" "2"

          echo ""
          echo "Done — $REPO tracked through $RUN_DATE"
